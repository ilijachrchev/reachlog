<div class="auth-container">
  <div class="auth-card">
    <div class="brand">
      <img src="/logo.png" alt="ReachLog" class="brand-logo" />
      <span class="brand-name">ReachLog</span>
    </div>
    <p class="subtitle">Create your account</p>
    <form [formGroup]="form" (ngSubmit)="submit()">
      <div class="field">
        <label>Full name</label>
        <input type="text" formControlName="fullName" placeholder="Ilija Chrchev" />
      </div>
      <div class="field">
        <label>Email</label>
        <input type="email" formControlName="email" placeholder="you@example.com" />
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" formControlName="password" placeholder="••••••••" />
      </div>
      <div class="field">
        <label>Confirm password</label>
        <input type="password" formControlName="confirmPassword" placeholder="••••••••" />
        <span class="field-error" *ngIf="form.get('confirmPassword')?.errors?.['mismatch']">
          Passwords do not match.
        </span>
      </div>
      <p class="error" *ngIf="error">{{ error }}</p>
      <button type="submit" [disabled]="loading || form.invalid">
        {{ loading ? 'Creating account...' : 'Create account' }}
      </button>
    </form>
    <p class="link">Already have an account? <a routerLink="/login">Sign in</a></p>
  </div>
</div>

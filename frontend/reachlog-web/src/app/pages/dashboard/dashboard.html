<div class="dashboard">
  <header>
    <h1>ReachLog</h1>
    <button (click)="goToInbox()" class="inbox-btn">Paste Inbox</button>
    <button (click)="logout()" class="logout-btn">Logout</button>
    <button (click)="goToNew()" class="new-btn">+ New Outreach</button>
  </header>

  <main>
    <p *ngIf="loading">Loading...</p>

    <p *ngIf="!loading && outreaches.length === 0">
      No outreaches yet.
    </p>

    <div class="outreach-list" *ngIf="!loading && outreaches.length > 0">
      <div class="outreach-card" *ngFor="let o of outreaches">
        <div class="card-header">
          <h3>{{ o.companyName }}</h3>
          <button class="delete-btn" (click)="delete(o.id)">Delete</button>
        </div>
        <p>{{ o.role }}</p>
        <p>{{ o.contactName }} — {{ o.contactEmail }}</p>
        <span class="status">{{ o.status }}</span>
      </div>
    </div>
  </main>
</div>

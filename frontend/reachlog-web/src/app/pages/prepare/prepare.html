<div class="prepare-shell">
  <header class="topbar">
    <div class="topbar-brand">
      <img src="/logo.png" alt="ReachLog" class="topbar-logo" />
      <span class="brand-name">ReachLog</span>
    </div>
    <nav class="topbar-nav">
      <button class="nav-btn" (click)="goToDashboard()">Dashboard</button>
      <button class="nav-btn" (click)="goToKanban()">Kanban</button>
      <button class="nav-btn" (click)="goToInbox()">Paste Inbox</button>
      <button class="nav-btn active-page">Prepare</button>
      <button class="nav-btn" (click)="goToJobs()">Jobs</button>
      <button class="nav-btn" (click)="goToCv()">CV</button>
      <button class="nav-btn" (click)="goToAnalytics()">Analytics</button>
      <button class="nav-btn accent" (click)="goToNew()">+ New</button>
    </nav>
  </header>

  <main class="prepare-body">
    <div class="prepare-header">
      <h1 class="prepare-title">Prepare</h1>
      <p class="prepare-sub">Paste a job description and get a tailored CV summary and cover letter.</p>
    </div>

    <div class="prepare-layout">
      <div class="prepare-left">
        <textarea
          [(ngModel)]="jobDescription"
          placeholder="Paste the job description here..."
          class="jd-textarea"
        ></textarea>
        <p class="error-msg" *ngIf="error">{{ error }}</p>
        <button
          class="btn-primary"
          (click)="prepare()"
          [disabled]="!jobDescription.trim() || loading"
        >
          <span *ngIf="!loading">Tailor my application</span>
          <span *ngIf="loading" class="btn-spinner-wrap">
            <span class="btn-spinner"></span>
            Generating...
          </span>
        </button>
      </div>

      <div class="prepare-right">
        <div class="empty-state" *ngIf="!result">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#3a3a42" stroke-width="1.25">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
            <path d="M9.5 12.5 L12 10 L14.5 12.5"/>
            <line x1="12" y1="10" x2="12" y2="17"/>
          </svg>
          <p class="empty-label">Paste a job description and get tailored application materials</p>
        </div>

        <div class="results" *ngIf="result">
          <div class="result-block">
            <div class="result-block-header">
              <span class="result-block-title">CV Summary</span>
              <button class="btn-copy" (click)="copy(result.cvSummary)">Copy</button>
            </div>
            <pre class="result-text">{{ result.cvSummary }}</pre>
          </div>

          <div class="result-block">
            <div class="result-block-header">
              <span class="result-block-title">Cover Letter</span>
              <button class="btn-copy" (click)="copy(result.coverLetter)">Copy</button>
            </div>
            <pre class="result-text">{{ result.coverLetter }}</pre>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>
